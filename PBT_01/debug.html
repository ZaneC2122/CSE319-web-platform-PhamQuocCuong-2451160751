<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang web</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        nav a {
            margin-right: 10px;
        }

        img {
            border: 0; /* theo gợi ý validator */
            max-width: 100%;
        }

        table {
            border-collapse: collapse;
            width: 50%;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to ShopTLU</h1>

    <nav>
        <a href="#home">Trang chủ</a>
        <a href="#products">Sản phẩm</a>
    </nav>
</header>

<main>

    <section id="products">
        <h2>Sản phẩm hot</h2>

        <figure>
            <img src="iphone.jpg" alt="iPhone 16 Pro">
            <figcaption>iPhone 16 Pro</figcaption>
        </figure>

        <p>Giá: <strong>25.990.000đ</strong></p>
    </section>

    <section>
        <h2>Thông tin</h2>

        <table>
            <thead>
                <tr>
                    <th scope="col">Tên</th>
                    <th scope="col">Giá</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <th scope="row">iPhone</th>
                    <td>25tr</td>
                </tr>
            </tbody>
        </table>

    </section>

</main>

<aside>
    <p>Sidebar content</p>
</aside>

<footer>
    <p>© 2026 ShopTLU</p>
</footer>

</body>
</html>

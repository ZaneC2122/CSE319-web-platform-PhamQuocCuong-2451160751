<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug CSS Layout</title>

    <link rel="stylesheet" href="debug_layout.css">
</head>

<body>

    <h1>Debug CSS Layout</h1>

    <!-- =========================
         Layout bị lỗi
    ========================== -->

    <section>
        <h2>Layout Bị Vỡ</h2>

        <div class="container broken">
            <div class="sidebar">
                Sidebar
            </div>

            <div class="content">
                Content bị xuống dòng vì tổng width > 960px
            </div>
        </div>
    </section>

    <!-- =========================
         Cách sửa 1
    ========================== -->

    <section>
        <h2>Sửa bằng border-box</h2>

        <div class="container fixed-borderbox">
            <div class="sidebar">
                Sidebar
            </div>

            <div class="content">
                Content dùng border-box
            </div>
        </div>
    </section>

    <!-- =========================
         Cách sửa 2
    ========================== -->

    <section>
        <h2>Sửa không dùng border-box</h2>

        <div class="container fixed-width">
            <div class="sidebar">
                Sidebar
            </div>

            <div class="content">
                Content giảm width xuống 556px
            </div>
        </div>
    </section>

</body>
</html>

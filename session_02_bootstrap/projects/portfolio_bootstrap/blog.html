<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Blog - DevPortfolio</title>
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Bootstrap Icons -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
        <!-- Custom Theme -->
        <link href="css/custom-theme.css" rel="stylesheet">
        <!-- Blog CSS -->
        <link href="css/blog.css" rel="stylesheet">
    </head>
    <body>
        <section class="py-5">
            <div class="container">
                <div class="row">

                    <!-- MAIN BLOG -->
                    <div class="col-lg-8">
                        <div class="row g-4">

                            <!-- CARD 1 -->
                            <div class="col-md-6">
                                <div class="card blog-card h-100 shadow-sm">
                                    <img src="https://picsum.photos/400/200" class="card-img-top">

                                    <div class="card-body">
                                        <span class="badge bg-primary mb-2">JavaScript</span>
                                        <h5 class="card-title">Learn JS Fast</h5>
                                        <p class="text-muted small">
                                            Học JavaScript hiệu quả cho người mới...
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <!-- CARD 2 -->
                            <div class="col-md-6">
                                <div class="card blog-card h-100 shadow-sm">
                                    <img src="https://picsum.photos/401/200" class="card-img-top">

                                    <div class="card-body">
                                        <span class="badge bg-success mb-2">CSS</span>
                                        <h5 class="card-title">CSS Tips</h5>
                                        <p class="text-muted small">
                                            Một số mẹo CSS bạn nên biết...
                                        </p>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- SIDEBAR (EMPTY) -->
                    <div class="col-lg-4">
                        <div class="sticky-top">

                            <!-- SEARCH -->
                            <div class="mb-4">
                                <input type="text" class="form-control" placeholder="Search...">
                            </div>

                            <!-- CATEGORY -->
                            <div class="bg-light p-3 rounded mb-4">
                                <h5>Categories</h5>
                                <ul class="list-group list-group-flush">
                                    <li class="list-group-item">JavaScript</li>
                                    <li class="list-group-item">CSS</li>
                                    <li class="list-group-item">React</li>
                                </ul>
                            </div>
                            <!-- RECENT POSTS -->
                            <div class="bg-light p-3 rounded mb-4">
                                <h5>Recent Posts</h5>
                                <ul class="list-group list-group-flush">
                                    <li class="list-group-item">Learn Git</li>
                                    <li class="list-group-item">React Basics</li>
                                    <li class="list-group-item">Node.js Intro</li>
                                </ul>
                            </div>

                            <!-- TAGS -->
                            <div class="bg-light p-3 rounded">
                                <h5>Tags</h5>
                                <div class="d-flex flex-wrap gap-2">
                                    <span class="badge bg-primary">HTML</span>
                                    <span class="badge bg-secondary">CSS</span>
                                    <span class="badge bg-success">JS</span>
                                    <span class="badge bg-danger">React</span>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </section>
        
        <section id="comments" class="py-5 bg-light">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-8">

                        <h4 class="fw-bold mb-4">Leave a Comment</h4>

                        <div class="card p-4 shadow-sm border-0">
                            <form>

                                <div class="d-flex gap-3">

                                    <!-- AVATAR -->
                                    <img src="https://i.pravatar.cc/50"
                                        class="rounded-circle"
                                        width="50" height="50">

                                    <!-- FORM -->
                                    <div class="flex-grow-1">

                                        <div class="row g-3">
                                            <div class="col-md-6">
                                                <input type="text"
                                                    class="form-control"
                                                    placeholder="Your Name"
                                                    required>
                                            </div>

                                            <div class="col-md-6">
                                                <input type="email"
                                                    class="form-control"
                                                    placeholder="Your Email"
                                                    required>
                                            </div>

                                            <div class="col-12">
                                                <textarea class="form-control"
                                                        rows="4"
                                                        placeholder="Write your comment..."
                                                        required></textarea>
                                            </div>

                                            <div class="col-12">
                                                <button class="btn btn-primary">
                                                    Post Comment
                                                </button>
                                            </div>
                                        </div>

                                    </div>

                                </div>

                            </form>
                        </div>

                    </div>
                </div>
            </div>
        </section>
    </body>
</html>

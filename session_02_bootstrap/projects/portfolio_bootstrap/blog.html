<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Blog - DevPortfolio</title>
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Bootstrap Icons -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
        <!-- Custom Theme -->
        <link href="css/custom-theme.css" rel="stylesheet">
        <!-- Blog CSS -->
        <link href="css/blog.css" rel="stylesheet">
    </head>
    <body>
        <section class="py-5">
            <div class="container">
                <div class="row">

                    <!-- MAIN BLOG -->
                    <div class="col-lg-8">
                        <div class="row g-4">

                            <!-- CARD 1 -->
                            <div class="col-md-6">
                                <div class="card blog-card h-100 shadow-sm">
                                    <img src="https://picsum.photos/400/200" class="card-img-top">

                                    <div class="card-body">
                                        <span class="badge bg-primary mb-2">JavaScript</span>
                                        <h5 class="card-title">Learn JS Fast</h5>
                                        <p class="text-muted small">
                                            Học JavaScript hiệu quả cho người mới...
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <!-- CARD 2 -->
                            <div class="col-md-6">
                                <div class="card blog-card h-100 shadow-sm">
                                    <img src="https://picsum.photos/401/200" class="card-img-top">

                                    <div class="card-body">
                                        <span class="badge bg-success mb-2">CSS</span>
                                        <h5 class="card-title">CSS Tips</h5>
                                        <p class="text-muted small">
                                            Một số mẹo CSS bạn nên biết...
                                        </p>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- SIDEBAR (EMPTY) -->
                    <div class="col-lg-4"></div>

                </div>
            </div>
        </section>
    </body>
</html>

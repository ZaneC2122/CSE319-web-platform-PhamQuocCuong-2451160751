<h1>Test HTML5 Validation</h1>

<form>

    <!-- Case 1 -->
    <label>Case 1 (required):</label><br>
    <input type="text" required value=""><br><br>

    <!-- Case 2 -->
    <label>Case 2 (email):</label><br>
    <input type="email" value="abc"><br><br>

    <!-- Case 3 -->
    <label>Case 3 (number range):</label><br>
    <input type="number" min="1" max="10" value="15"><br><br>

    <!-- Case 4 -->
    <label>Case 4 (pattern):</label><br>
    <input type="text" pattern="[0-9]{10}" value="abc123"><br><br>

    <!-- Case 5 -->
    <label>Case 5 (minlength):</label><br>
    <input type="password" minlength="8" value="123"><br><br>

    <button type="submit">Submit</button>

</form>

</body>
</html>
